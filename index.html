<header class="relative border-b border-slate-800 bg-slate-950 overflow-hidden">
    <nav class="flex justify-between items-center px-10 py-6 border-b border-slate-800 relative z-10">
        <div class="text-3xl font-black text-white tracking-tighter">REDMATIC</div>
        <div class="space-x-8 font-medium">
            <a href="index.html" class="text-red-500">Home</a>
            <a href="reputation.html" class="hover:text-red-500 transition">Reputation</a>
            <a href="automation.html" class="hover:text-red-500 transition">Automation</a>
            <a href="about.html" class="hover:text-red-500 transition">About</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center py-20 px-6 relative z-10">
        <div>
            <h1 class="text-6xl font-black text-white mb-6 leading-tight">
                Systems that <span class="text-red-500">process</span>, not just store.
                            </h1>
            <p class="text-xl text-slate-400 mb-10">
                We bridge the gap between data and action. Redmatic architecturally integrates your reputation management and operational workflows into a unified, high-velocity engine.
            </p>
            <div class="flex gap-4">
                <a href="reputation.html" class="bg-red-600 hover:bg-red-700 text-white font-bold py-4 px-8 rounded shadow-[0_0_15px_rgba(220,38,38,0.5)] transition">Request Audit</a>
                <a href="automation.html" class="border border-slate-700 hover:bg-slate-800 text-white font-bold py-4 px-8 rounded transition">Automation Lab</a>
            </div>
        </div>

        <div class="w-full">
            <svg viewBox="0 0 500 250" class="w-full h-auto" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                                           <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
                        <feGaussianBlur stdDeviation="3" result="blur" />
                        <feComposite in="SourceGraphic" in2="blur" operator="over" />
                    </filter>
                    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                        <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" stroke-width="0.5"/>
                    </pattern>
                </defs>

                <rect width="100%" height="100%" fill="url(#grid)" />

                <!-- Circuitry Paths -->
                <path d="M50 125 L450 125 M150 50 L150 200 M350 50 L350 200 M50 50 L450 200 M450 50 L50 200" stroke="#334155" stroke-width="2" fill="none"/>   
                                <!-- Glowing Nodes -->
                <circle cx="50" cy="125" r="6" fill="#ef4444" filter="url(#glow-red)" />
                <circle cx="150" cy="50" r="6" fill="#06b6d4" filter="url(#glow-cyan)" />
                <circle cx="350" cy="200" r="6" fill="#ef4444" filter="url(#glow-red)" />
                <circle cx="250" cy="125" r="8" fill="#fff" filter="url(#glow-red)" />

                <!-- Animated Data Packets -->
                <circle r="4" fill="#ef4444" filter="url(#glow-red)">
                    <animateMotion dur="4s" repeatCount="indefinite" path="M50 125 L450 125" />
                </circle>
                <circle r="4" fill="#06b6d4" filter="url(#glow-cyan)">
                    <animateMotion dur="3s" repeatCount="indefinite" path="M150 200 L150 50" />
                </circle>
                <circle r="4" fill="#ef4444" filter="url(#glow-red)">
                                        <animateMotion dur="5s" repeatCount="indefinite" path="M50 50 L450 200" />
                </circle>
            </svg>
        </div>
    </div>
</header>
